<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>InfoEstoque | Cadastro de Produto</title>

  <link rel="stylesheet" href="css/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://kit.fontawesome.com/a2d9d5a64f.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="layout">

  <aside class="sidebar">

    <div>

      <div class="sidebar-logo">
        <i class="fa-solid fa-boxes-stacked"></i>
        <span>InfoEstoque</span>
      </div>

      <nav>

        <a href="home.html">
          <i class="fa-solid fa-chart-line"></i>
          Dashboard
        </a>

        <a href="produtos.html">
          <i class="fa-solid fa-box"></i>
          Produtos
        </a>

        <a href="cadastro_produto.html" class="active">
          <i class="fa-solid fa-plus"></i>
          Cadastro
        </a>

        <a href="movimentacoes.html">
          <i class="fa-solid fa-arrow-right-arrow-left"></i>
          Movimentações
        </a>

      </nav>

    </div>

    <button class="logout-btn" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i>
      Sair
    </button>

  </aside>

  <main class="content">

    <div class="header-dashboard">

      <div>
        <h1>Cadastrar Produto</h1>
        <p>Adicione novos produtos ao estoque</p>
      </div>

    </div>

    <section class="card form-card">

      <form id="formProduto">

        <div class="form-grid">

          <div class="input-group">
            <i class="fa-solid fa-box"></i>

            <input
              type="text"
              id="nome"
              maxlength="30"
              placeholder="Nome do produto"
              required
            >
          </div>

          <div class="input-group">
            <i class="fa-solid fa-layer-group"></i>

            <input
              type="text"
              id="categoria"
              maxlength="30"
              placeholder="Categoria"
            >
          </div>

          <div class="input-group">
             <i class="fa-solid fa-dollar-sign"></i>

           <input
            type="number"
            step="0.01"
            id="preco"
            placeholder="Preço"
            required
           >
           </div>

          <div class="input-group">
            <i class="fa-solid fa-cubes"></i>

            <input
              type="number"
              id="quantidade"
              placeholder="Quantidade"
              required
            >
          </div>

         <div class="input-group">
            <i class="fa-solid fa-triangle-exclamation"></i>

         <input
          type="number"
          id="quantidade_minima"
          placeholder="Quantidade mínima"
          required
          >
          </div>
          <div class="input-group full-width">
            <i class="fa-solid fa-align-left"></i>

        </div>

        <button type="submit" class="btn-salvar">
          <i class="fa-solid fa-floppy-disk"></i>
          Salvar Produto
        </button>

        <div id="mensagem"></div>

      </form>

    </section>

  </main>

</div>

<script type="module" src="js/cadastro_produtos.js"></script>

</body>
</html>
