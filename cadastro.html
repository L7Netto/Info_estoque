<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>InfoEstoque | Cadastro</title>

  <link rel="stylesheet" href="css/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://kit.fontawesome.com/a2d9d5a64f.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="login-container">

  <div class="login-box">

    <div class="logo-area">

      <div class="logo-icon">
        <i class="fa-solid fa-user-plus"></i>
      </div>

      <h1>Criar Conta</h1>

      <p>
        Cadastre-se para acessar o sistema de estoque.
      </p>

    </div>

    <form id="cadastroForm">

      <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="Seu email" required>
      </div>

      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="senha" placeholder="Crie uma senha" required>
      </div>

      <button type="submit">
        Criar Conta
      </button>

      <div id="mensagem"></div>

    </form>

    <a href="index.html" class="btn-secundario">
      Já tenho conta
    </a>

     </div>

  <div class="login-image">

    <div class="overlay">

      <h2>Controle total do seu estoque</h2>

      <p>
        Cadastre produtos, acompanhe movimentações e gerencie seu estoque com uma interface moderna.
      </p>

    </div>

  </div>

</div>

<script type="module" src="js/usuarios.js"></script>

</body>
</html>
